<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Landing Pad</title>
<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}
}
</script>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #2a2a3e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
canvas { display: block; }
#overlay {
position: fixed; bottom: 16px; left: 16px;
background: rgba(0,0,0,.55); color: #ccc;
padding: 5px 10px; border-radius: 6px;
font-size: 13px; line-height: 1.6;
pointer-events: auto; backdrop-filter: blur(4px);
max-width: calc(100vw - 32px);
}
#overlay a { color: #8cb4ff; text-decoration: none; margin: 0 4px; }
#overlay a:hover { color: #fff; }
#overlay .sep { color: #555; margin: 0 6px; }
#loading {
position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
color: #aaa; font-size: 20px; pointer-events: none;
}
</style>
</head>
<body>

<div id="loading">Loading model…</div>

<div id="overlay">
<strong>The Landing Pad</strong>
<span class="sep">·</span>
Drag to rotate · Scroll to zoom · Right‑drag to pan
<span class="sep">·</span>
<a href="index.scad" download>index.scad</a>
<a href="index.stl" download>index.stl</a>
<a href="https://github.com/boronine/the-landing-pad">GitHub</a>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const loadingEl = document.getElementById('loading');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);
scene.fog = new THREE.Fog(0x2a2a3e, 2000, 12000);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 10, 20000);
camera.position.set(5000, -2000, 800);
camera.lookAt(0, 0, 300);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 200);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 500;
controls.maxDistance = 15000;
controls.maxPolarAngle = Math.PI / 2 + 0.3;
controls.update();

scene.add(new THREE.AmbientLight(0x8899bb, 1.5));

const sun = new THREE.DirectionalLight(0xffeedd, 4);
sun.position.set(5000, 3000, 2000);
sun.castShadow = true;
sun.shadow.mapSize.width = sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 20000;
sun.shadow.camera.left = sun.shadow.camera.bottom = -3000;
sun.shadow.camera.right = sun.shadow.camera.top = 3000;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8899cc, 1.5);
fill.position.set(-2000, 500, -2000);
scene.add(fill);

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(10000, 10000),
new THREE.MeshStandardMaterial({ color: 0x334433, roughness: 0.8, metalness: 0.1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.z = -5;
ground.receiveShadow = true;
scene.add(ground);

scene.add(new THREE.PolarGridHelper(3000, 32, 24, 64, 0x445566, 0x334455));

new STLLoader().load('index.stl',
(g) => {
loadingEl.style.display = 'none';
g.computeBoundingBox();
const c = new THREE.Vector3();
g.boundingBox.getCenter(c);
g.translate(-c.x, -c.y, -c.z);
g.computeVertexNormals();

const mesh = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.6, metalness: 0.3 }));
	mesh.rotation.x = -Math.PI / 2;
	mesh.castShadow = mesh.receiveShadow = true;
scene.add(mesh);

const box = new THREE.Box3().setFromObject(mesh);
const mc = new THREE.Vector3();
box.getCenter(mc);
mesh.position.y = -box.min.y;
controls.target.copy(mc);
controls.target.y += mesh.position.y;
controls.update();
},
(p) => { loadingEl.textContent = `Loading… ${Math.round(p.loaded / p.total * 100)}%`; },
() => { loadingEl.textContent = 'Failed to load model.'; }
);

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

(function animate() {
requestAnimationFrame(animate);
controls.update();
renderer.render(scene, camera);
})();
</script>
</body>
</html>
