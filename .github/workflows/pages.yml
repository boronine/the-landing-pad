name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSCAD and xvfb
        run: |
          echo "Installing OpenSCAD and xvfb..."
          sudo apt-get update
          sudo apt-get install -y openscad xvfb
          openscad --version

      - name: Generate rendered image with xvfb
        - name: Run xvfb to generate rendered image
          run: |
            echo "Running make with xvfb to generate index.png..."
            xvfb-run -a make
            echo "Generated index.png:"
            ls -lh index.png

        - name: Generate STL files from OBJ with tracing
          run: |
            echo "Checking Makefile contents around STL rule:"
            sed -n '27,32p' Makefile
            echo ""
            echo "Testing make recipe expansion:"
            make -n 2025-06-13.stl
            echo ""
            echo "Running actual STL generation:"
            make 2025-06-13.stl || echo "FAILED"
            echo ""
            echo "All STL files:"
            ls -lh *.stl 2>/dev/null || echo "No STL files found"

      - name: List all files for debugging
        run: |
          echo "All files in repository:"
          find . -type f -not -path './.git/*' | sort

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
          name: github-pages

  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
